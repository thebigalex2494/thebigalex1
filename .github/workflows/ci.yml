name: CI Pipeline

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    name: Build and Test

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install dependencies
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip nodejs npm curl git shellcheck

      # Step 3: Make test scripts executable
      - name: Make scripts executable
        run: |
          chmod +x tests/test-suite.sh
          chmod +x checks/verify-tools.sh
          chmod +x checks/health-check.sh

      # Step 4: Run verify-tools check
      - name: Verify tools
        run: |
          bash checks/verify-tools.sh

      # Step 5: Run test suite
      - name: Run test suite
        run: |
          bash tests/test-suite.sh
        continue-on-error: true

      # Step 6: Run shellcheck on all scripts
      - name: Run shellcheck
        run: |
          find . -type f \( -name "*.sh" -o -name "*install*" -o -name "*setup*" \) \
            -path "./.git" -prune -o -type f \( -name "*.sh" \) -print0 2>/dev/null | \
            xargs -0 shellcheck -S warning 2>/dev/null || echo "Shellcheck completed with warnings"
        continue-on-error: true

      # Step 7: Collect test results
      - name: Collect test results
        if: always()
        run: |
          mkdir -p artifacts
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          bash tests/test-suite.sh > artifacts/test-results-${TIMESTAMP}.txt 2>&1 || true
          bash checks/verify-tools.sh >> artifacts/test-results-${TIMESTAMP}.txt 2>&1 || true

      # Step 8: Upload artifacts
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_id }}
          path: artifacts/

      # Step 9: Generate status report
      - name: Generate CI Status Report
        if: always()
        run: |
          cat > CI_STATUS.md << 'EOF'
          # CI Run Report
          
          - **Run ID**: ${{ github.run_id }}
          - **Branch**: ${{ github.ref }}
          - **Commit**: ${{ github.sha }}
          - **Timestamp**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          - **Status**: ${{ job.status }}
          
          ## Artifacts
          Test results have been uploaded and are available in the Actions artifacts.
          
          ## Next Steps
          1. Review test results in the artifacts
          2. Check shellcheck warnings above
          3. Fix any failing tests or linting issues
          4. Push fixes and re-run CI
          
          ---
          Generated by CI Pipeline Workflow
          EOF
          cat CI_STATUS.md

      # Step 10: Comment on PR (if applicable)
      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const status = '${{ job.status }}';
            const emoji = status === 'success' ? '✅' : '❌';
            const message = `${emoji} **CI Pipeline** - ${status.toUpperCase()}\n\n` +
              `- Run ID: ${{ github.run_id }}\n` +
              `- Commit: ${{ github.sha }}\n` +
              `- [View artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n\n` +
              `**Next Steps:**\n` +
              `1. Review test results in artifacts\n` +
              `2. Check shellcheck warnings\n` +
              `3. Fix issues and push\n`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });
